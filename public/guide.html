<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide · ITS DevSecOps Adventure</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- marked renders markdown to HTML.
         Pinned version from cdnjs. If you run fully offline, vendor
         this file into the project and update the src below.
         (Subresource integrity hash intentionally not set; add one in
         production using the value from
         https://cdnjs.com/libraries/marked/12.0.2) -->
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"></script>
    <script defer src="guide.js"></script>
    <style>
      /* Markdown styling. Tailwind's typography plugin is not loaded
         from the CDN by default, so we hand-style just enough. */
      #guide-content h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin: 1rem 0 0.75rem;
      }
      #guide-content h2 {
        font-size: 1.4rem;
        font-weight: 700;
        margin: 1.5rem 0 0.5rem;
        padding-bottom: 0.25rem;
        border-bottom: 1px solid #e2e8f0;
      }
      #guide-content h3 {
        font-size: 1.15rem;
        font-weight: 600;
        margin: 1.25rem 0 0.5rem;
      }
      #guide-content h4 {
        font-size: 1rem;
        font-weight: 600;
        margin: 1rem 0 0.5rem;
      }
      #guide-content p,
      #guide-content ul,
      #guide-content ol {
        margin: 0.6rem 0;
        line-height: 1.55;
      }
      #guide-content ul {
        list-style: disc;
        padding-left: 1.25rem;
      }
      #guide-content ol {
        list-style: decimal;
        padding-left: 1.25rem;
      }
      #guide-content li {
        margin: 0.15rem 0;
      }
      #guide-content code {
        background: #f1f5f9;
        padding: 0.1rem 0.35rem;
        border-radius: 0.25rem;
        font-size: 0.85em;
        font-family: ui-monospace, Menlo, Consolas, monospace;
      }
      #guide-content pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        overflow-x: auto;
        font-size: 0.85em;
        margin: 0.75rem 0;
      }
      #guide-content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }
      #guide-content blockquote {
        border-left: 4px solid #cbd5e1;
        padding: 0.25rem 0.75rem;
        background: #f8fafc;
        color: #475569;
        margin: 0.75rem 0;
      }
      #guide-content table {
        border-collapse: collapse;
        margin: 0.75rem 0;
        width: 100%;
        font-size: 0.9em;
      }
      #guide-content th,
      #guide-content td {
        border: 1px solid #e2e8f0;
        padding: 0.5rem 0.75rem;
        text-align: left;
      }
      #guide-content th {
        background: #f1f5f9;
      }
      #guide-content a {
        color: #0284c7;
        text-decoration: underline;
      }
      #guide-content hr {
        margin: 1.5rem 0;
        border: none;
        border-top: 1px solid #e2e8f0;
      }
      #guide-content img {
        max-width: 100%;
        height: auto;
      }

      /* Print: drop chrome, keep content. */
      @media print {
        #guide-sidebar-wrap,
        #guide-header,
        #guide-toc-wrap {
          display: none !important;
        }
        main {
          padding: 0 !important;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <!-- Header -->
    <header id="guide-header" class="bg-white border-b border-slate-200">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
        <div class="min-w-0">
          <div class="text-xs text-slate-500">Guide</div>
          <h1 id="guide-title" class="font-bold text-base sm:text-lg truncate">Loading…</h1>
          <code id="guide-subtitle" class="text-xs text-slate-500"></code>
        </div>
        <nav class="flex items-center gap-2 text-sm">
          <a href="index.html" class="px-3 py-1.5 rounded border border-slate-300 hover:bg-slate-50">
            Participant board
          </a>
          <a
            href="admin.html"
            class="px-3 py-1.5 rounded border border-slate-300 hover:bg-slate-50 hidden sm:inline-block">
            Admin
          </a>
          <a
            id="guide-raw-link"
            href="#"
            target="_blank"
            class="px-3 py-1.5 rounded border border-slate-300 hover:bg-slate-50 text-xs text-slate-500"
            title="Open raw markdown source in a new tab">
            Raw
          </a>
          <button
            onclick="window.print()"
            class="px-3 py-1.5 rounded border border-slate-300 hover:bg-slate-50 hidden sm:inline-block">
            Print
          </button>
        </nav>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 grid grid-cols-1 lg:grid-cols-[220px_1fr_220px] gap-6">
      <!-- Left: list of other guides -->
      <aside id="guide-sidebar-wrap" class="order-2 lg:order-1">
        <div class="sticky top-4">
          <div class="text-xs uppercase tracking-wide text-slate-500 font-semibold mb-2">Other guides</div>
          <div id="guide-sidebar"></div>
        </div>
      </aside>

      <!-- Center: the rendered content -->
      <article class="order-1 lg:order-2 min-w-0 bg-white border border-slate-200 rounded-lg p-5 sm:p-8">
        <div id="guide-content">
          <p class="text-slate-500">Loading…</p>
        </div>
      </article>

      <!-- Right: TOC for the current guide -->
      <aside id="guide-toc-wrap" class="order-3 hidden lg:block">
        <div class="sticky top-4">
          <div class="text-xs uppercase tracking-wide text-slate-500 font-semibold mb-2">On this page</div>
          <nav id="guide-toc"></nav>
        </div>
      </aside>
    </main>
  </body>
</html>
