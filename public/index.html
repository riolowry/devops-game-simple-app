<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ITS DevSecOps Adventure</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.core.js"></script>
    <script src="app.logic.js"></script>
    <script src="app.store.js"></script>
    <script src="app.actions.js"></script>
    <script src="app.boot.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  </head>

  <body class="bg-slate-50 text-slate-900 antialiased" x-data x-init="$store.app.init()">
    <!-- LOGIN SCREEN -->
    <template x-if="!$store.app.user">
      <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
          <h1 class="text-2xl font-bold">ITS DevSecOps Adventure</h1>
          <p class="text-slate-600 mt-2 text-sm">Enter your participant token to join.</p>
          <form class="mt-6 space-y-4" @submit.prevent="$store.app.login($refs.tokenInput.value)">
            <div>
              <label class="block text-sm font-medium mb-1">Token</label>
              <input
                x-ref="tokenInput"
                type="text"
                autocomplete="off"
                autocapitalize="characters"
                spellcheck="false"
                placeholder="e.g. K7QX39"
                class="w-full uppercase tracking-widest font-mono text-lg px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500" />
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white font-medium py-3 rounded-lg hover:bg-slate-800">
              Join
            </button>
            <p x-show="$store.app.loginError" x-text="$store.app.loginError" class="text-sm text-rose-600 text-center"></p>
          </form>
        </div>
      </div>
    </template>

    <!-- MAIN APP -->
    <template x-if="$store.app.user">
      <div class="min-h-screen flex flex-col" x-data="{openIssue: null, helpOpen: false, cardHelpOpen: false, newCard: null, rejectFor: null, rejectReason: '', askOpen: false, askTargetRole: '', askTargetTeam: '', askBody: '', answerOpen: false, answerBody: ''}">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
          <div class="px-3 sm:px-6 py-3 flex items-center gap-2 sm:gap-4">
            <div class="min-w-0 flex-1">
              <div class="text-xs text-slate-500 truncate" x-text="$store.app.gameState.session_label"></div>
              <div class="flex items-baseline gap-2">
                <h1 class="font-bold text-base sm:text-lg">DevSecOps Adventure</h1>
                <span class="inline-block px-2 py-0.5 bg-indigo-100 text-indigo-800 text-xs font-medium rounded-full"
                      x-text="'Sprint ' + $store.app.gameState.current_sprint"></span>
              </div>
            </div>
            <div class="hidden sm:block text-right">
              <div class="text-xs text-slate-500">Signed in as</div>
              <div class="text-sm font-medium">
                <span x-text="$store.app.roleLabel($store.app.effectiveRole())"></span>
                <template x-if="$store.app.effectiveTeam()">
                  <span class="text-slate-500">· <span x-text="$store.app.effectiveTeam()"></span></span>
                </template>
              </div>
            </div>
            <div class="flex items-center" :title="'Sync: ' + $store.app.connectionMode">
              <span class="w-2.5 h-2.5 rounded-full"
                    :class="{'bg-emerald-500': $store.app.connectionMode === 'realtime', 'bg-amber-500': $store.app.connectionMode === 'polling', 'bg-rose-500': $store.app.connectionMode === 'disconnected', 'bg-slate-300': $store.app.connectionMode === 'connecting'}"></span>
            </div>
            <a href="leaderboard.html" target="_blank" rel="noopener"
               class="hidden sm:inline-block px-3 py-1.5 text-sm rounded-lg border border-slate-300 hover:bg-slate-50">
              Leaderboard
            </a>
            <button @click="helpOpen = true"
                    class="px-3 py-1.5 text-sm rounded-lg border border-slate-300 hover:bg-slate-50 min-h-[44px] sm:min-h-0">
              Help
            </button>
            <button @click="$store.app.logout()"
                    class="px-3 py-1.5 text-sm rounded-lg border border-slate-300 hover:bg-slate-50 min-h-[44px] sm:min-h-0">
              Exit
            </button>
          </div>

          <!-- Small-screen identity row -->
          <div class="sm:hidden px-3 pb-2 text-xs text-slate-600">
            <span class="font-medium" x-text="$store.app.roleLabel($store.app.effectiveRole())"></span>
            <template x-if="$store.app.effectiveTeam()">
              <span>· <span x-text="$store.app.effectiveTeam()"></span></span>
            </template>
            <template x-if="$store.app.user.token">
              <span class="ml-2 font-mono text-slate-400" x-text="$store.app.user.token"></span>
            </template>
          </div>

          <!-- Cross-training banner -->
          <template x-if="$store.app.crossTrainedRole()">
            <div class="px-3 sm:px-6 py-1.5 bg-violet-50 border-t border-violet-200 text-xs text-violet-900">
              You are also cross-trained as
              <span class="font-medium" x-text="$store.app.roleLabel($store.app.crossTrainedRole())"></span>
              <template x-if="$store.app.user.cross_trained_team">
                <span> on <span class="font-medium" x-text="$store.app.user.cross_trained_team"></span></span>
              </template>.
            </div>
          </template>

          <!-- Column nav strip -->
          <nav class="flex gap-1 px-3 sm:px-6 pb-2 overflow-x-auto text-xs">
            <template x-for="s in $store.app.columnOrder()" :key="s">
              <a :href="'#col-' + s"
                 class="whitespace-nowrap px-2.5 py-1 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-700">
                <span x-text="$store.app.columnLabel(s)"></span>
                <span class="ml-1 text-slate-500" x-text="'(' + $store.app.issuesInColumn(s).length + ')'"></span>
              </a>
            </template>
          </nav>
        </header>

        <!-- KANBAN BOARD -->
        <main class="flex-1 overflow-hidden">
          <div class="h-full overflow-x-auto snap-x snap-mandatory sm:snap-none px-3 sm:px-6 py-4">
            <div class="flex gap-3 sm:gap-4 h-full min-h-[60vh]">
              <template x-for="status in $store.app.columnOrder()" :key="status">
                <section :id="'col-' + status"
                         class="snap-start shrink-0 w-[85vw] sm:w-80 bg-slate-100 rounded-xl flex flex-col max-h-full">
                  <header class="px-3 py-2 border-b border-slate-200 flex items-baseline justify-between">
                    <h2 class="font-semibold text-sm" x-text="$store.app.columnLabel(status)"></h2>
                    <span class="text-xs text-slate-500" x-text="$store.app.issuesInColumn(status).length"></span>
                  </header>

                  <div class="overflow-y-auto p-2 space-y-2 flex-1 min-h-[200px]">
                    <template x-for="issue in $store.app.issuesInColumn(status)" :key="issue.id">
                      <button @click="openIssue = issue"
                              class="w-full text-left bg-white p-3 rounded-lg border border-slate-200 hover:border-slate-400 hover:shadow-sm min-h-[80px]">
                        <div class="flex items-start gap-2">
                          <span class="font-mono text-xs text-slate-400" x-text="'#' + issue.id"></span>
                          <span class="flex-1 font-medium text-sm" x-text="issue.title"></span>
                          <template x-if="$store.app.commentCountForIssue(issue.id) > 0">
                            <span class="text-xs text-slate-500" x-text="'💬 ' + $store.app.commentCountForIssue(issue.id)"></span>
                          </template>
                        </div>
                        <div class="mt-2 flex flex-wrap gap-1.5">
                          <template x-if="issue.team">
                            <span class="text-xs px-2 py-0.5 rounded-full" :class="$store.app.teamColor(issue.team)" x-text="issue.team"></span>
                          </template>
                          <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-800" x-text="'$' + issue.price"></span>
                          <span class="text-xs px-2 py-0.5 rounded-full bg-slate-200 text-slate-700"
                                x-text="'Batch ' + $store.app.progressFor(issue).done + '/' + issue.batch_size"></span>
                          <template x-if="issue.containerized">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-cyan-100 text-cyan-800">container</span>
                          </template>
                          <template x-if="issue.code_freeze">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-900">freeze</span>
                          </template>
                          <template x-if="issue.stopped">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-rose-100 text-rose-900">stopped</span>
                          </template>
                          <template x-if="issue.hacked_flag && $store.app.isFacilitatorView()">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-fuchsia-100 text-fuchsia-900">hacked</span>
                          </template>
                          <template x-if="issue.flawed && $store.app.isFacilitatorView()">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-900">flawed</span>
                          </template>
                          <template x-if="status === 'clarifications' && issue.clarification_target_role">
                            <span class="text-xs px-2 py-0.5 rounded-full font-semibold"
                                  :class="$store.app.clarificationKind(issue) === 'question' ? 'bg-blue-100 text-blue-900' : 'bg-rose-100 text-rose-900'"
                                  x-text="$store.app.clarificationLabel(issue)"></span>
                          </template>
                        </div>
                      </button>
                    </template>

                    <!-- Business: create issue button in Market column -->
                    <template x-if="status === 'market' && $store.app.effectiveRole() === 'business'">
                      <button @click="newCard = {title: '', description_url: '', price: 100, batch_size: 1, acceptance_criteria: '', curated_url_id: null, category: ''}"
                              class="w-full text-sm py-3 rounded-lg border-2 border-dashed border-slate-300 text-slate-500 hover:border-slate-400 hover:text-slate-700 min-h-[60px]">
                        + New Product Request
                      </button>
                    </template>
                  </div>
                </section>
              </template>
            </div>
          </div>
        </main>

        <!-- CARD DETAIL MODAL -->
        <template x-if="openIssue && openIssue !== 'new'">
          <div class="fixed inset-0 bg-slate-900/50 z-30 flex items-end sm:items-center justify-center p-0 sm:p-4"
               @click.self="openIssue = null; cardHelpOpen = false; rejectFor = null; rejectReason = ''; askOpen = false; askTargetRole = ''; askTargetTeam = ''; askBody = ''; answerOpen = false; answerBody = ''; $store.app.securityCheckResult = null; $store.app.shiftLeftResult = null">
            <div class="bg-white w-full sm:max-w-2xl rounded-t-2xl sm:rounded-2xl max-h-[90vh] overflow-y-auto shadow-2xl"
                 @keydown.escape.window="openIssue = null">
              <header class="px-5 py-4 border-b border-slate-200 flex items-start gap-3 sticky top-0 bg-white z-10">
                <div class="min-w-0 flex-1">
                  <div class="text-xs text-slate-500 font-mono">#<span x-text="openIssue?.id"></span></div>
                  <h2 class="text-xl font-bold leading-tight" x-text="openIssue?.title"></h2>
                  <div class="mt-1 text-xs text-slate-500">
                    <span x-text="'Sprint ' + (openIssue?.sprint_created || '')"></span>
                    <span class="mx-1">·</span>
                    <span x-text="$store.app.columnLabel(openIssue?.status || '')"></span>
                  </div>
                </div>
                <button @click="cardHelpOpen = !cardHelpOpen"
                        class="w-9 h-9 rounded-full border border-slate-300 hover:bg-slate-50 flex items-center justify-center text-sm font-bold text-slate-600 flex-shrink-0"
                        :class="cardHelpOpen ? 'bg-sky-100 border-sky-400 text-sky-700' : ''"
                        title="What can I do here?">?</button>
                <button @click="openIssue = null; cardHelpOpen = false"
                        class="text-slate-400 hover:text-slate-600 text-2xl leading-none flex-shrink-0 px-2"
                        aria-label="Close">&times;</button>
              </header>

              <div class="p-5 sm:p-6 space-y-4">
                <!-- Context-aware help panel -->
                <template x-if="cardHelpOpen">
                  <div class="bg-sky-50 border border-sky-200 rounded-lg p-3 text-sm">
                    <div class="font-semibold text-sky-900" x-text="$store.app.helpForCard(openIssue).title"></div>
                    <ul class="list-disc ml-5 mt-1 text-sky-900 space-y-0.5">
                      <template x-for="b in $store.app.helpForCard(openIssue).bullets" :key="b">
                        <li x-text="b"></li>
                      </template>
                    </ul>
                  </div>
                </template>

                <!-- Clarification banner. Visible whenever the card is
                     in the Clarifications column. Shape and color
                     depend on the kind: rose for rejection (rework
                     needed), blue for question (answer needed). The
                     prompt body is the originating rejection comment
                     OR the originating question comment. -->
                <template x-if="openIssue && openIssue.status === 'clarifications'">
                  <div class="rounded-lg border-l-4 p-3"
                       :class="$store.app.clarificationKind(openIssue) === 'question'
                               ? 'bg-blue-50 border-blue-500'
                               : 'bg-rose-50 border-rose-500'">
                    <div class="flex items-center gap-2 flex-wrap mb-1">
                      <span class="text-[10px] uppercase tracking-wide font-bold px-2 py-0.5 rounded-full"
                            :class="$store.app.clarificationKind(openIssue) === 'question'
                                    ? 'bg-blue-200 text-blue-900'
                                    : 'bg-rose-200 text-rose-900'"
                            x-text="$store.app.clarificationKind(openIssue) === 'question' ? 'Question' : 'Rejection'"></span>
                      <span class="text-xs font-medium"
                            :class="$store.app.clarificationKind(openIssue) === 'question' ? 'text-blue-900' : 'text-rose-900'">
                        Waiting on
                        <strong x-text="$store.app.roleLabel(openIssue.clarification_target_role || 'anyone')"></strong>
                        <template x-if="openIssue.clarification_target_team">
                          <span> on <strong x-text="openIssue.clarification_target_team"></strong></span>
                        </template>
                      </span>
                    </div>
                    <template x-if="$store.app.latestClarificationPrompt(openIssue)">
                      <div>
                        <div class="text-[11px]"
                             :class="$store.app.clarificationKind(openIssue) === 'question' ? 'text-blue-700' : 'text-rose-700'">
                          From
                          <span x-text="$store.app.roleLabel($store.app.latestClarificationPrompt(openIssue).author_role_at_post || 'anyone')"></span>
                          <template x-if="$store.app.latestClarificationPrompt(openIssue).author_team_at_post">
                            <span> · <span x-text="$store.app.latestClarificationPrompt(openIssue).author_team_at_post"></span></span>
                          </template>
                          · <span x-text="$store.app.relativeTime($store.app.latestClarificationPrompt(openIssue).created_at)"></span>
                        </div>
                        <div class="mt-1 text-sm whitespace-pre-wrap"
                             :class="$store.app.clarificationKind(openIssue) === 'question' ? 'text-blue-900' : 'text-rose-900'"
                             x-text="$store.app.latestClarificationPrompt(openIssue).body"></div>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- Badges. Team is promoted to a prominent color-coded badge so
                     developers (and simulating facilitators) see at a glance which
                     team owns the ticket. -->
                <div class="flex flex-wrap gap-2 items-center">
                  <template x-if="openIssue?.team">
                    <span class="text-sm px-3 py-1 rounded-full font-semibold"
                          :class="$store.app.teamColor(openIssue?.team)"
                          x-text="openIssue?.team"></span>
                  </template>
                  <template x-if="!openIssue?.team">
                    <span class="text-sm px-3 py-1 rounded-full bg-slate-200 text-slate-600 italic">Unclaimed</span>
                  </template>
                  <span class="text-xs px-2 py-1 rounded-full bg-emerald-100 text-emerald-800"
                        x-text="'Price: $' + (openIssue?.price || 0)"></span>
                  <span class="text-xs px-2 py-1 rounded-full bg-slate-200 text-slate-700"
                        x-text="'Batch: ' + $store.app.progressFor(openIssue).done + '/' + (openIssue?.batch_size || 0)"></span>
                  <template x-if="openIssue?.containerized">
                    <span class="text-xs px-2 py-1 rounded-full bg-cyan-100 text-cyan-800">Containerized</span>
                  </template>
                  <template x-if="openIssue?.code_freeze">
                    <span class="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-900">Code Freeze</span>
                  </template>
                  <template x-if="openIssue?.stopped">
                    <span class="text-xs px-2 py-1 rounded-full bg-rose-100 text-rose-900">Stopped</span>
                  </template>
                </div>

                <!-- Description URL + Acceptance Criteria -->
                <div class="space-y-3 text-sm">
                  <template x-if="openIssue?.description_url">
                    <div>
                      <div class="text-xs text-slate-500 mb-1">Colouring page</div>
                      <a :href="openIssue?.description_url" target="_blank" rel="noopener"
                         class="text-sky-600 underline hover:text-sky-700 break-all" x-text="openIssue?.description_url"></a>
                    </div>
                  </template>
                  <template x-if="openIssue?.acceptance_criteria">
                    <div class="bg-slate-50 border border-slate-200 rounded-lg p-3">
                      <div class="text-xs text-slate-500 font-medium mb-1">Acceptance Criteria</div>
                      <div class="text-slate-800 whitespace-pre-wrap" x-text="openIssue?.acceptance_criteria"></div>
                    </div>
                  </template>
                </div>

                <!-- Facilitator-only: when viewing a card belonging to a team
                     the facilitator is not currently simulating, offer a
                     one-click team switch so they can act on the ticket
                     without reaching for the bottom picker. Silent for
                     everyone else (including a facilitator already on the
                     right team and observe-only mode). -->
                <template
                  x-if="$store.app.isFacilitator() && openIssue?.team && $store.app.effectiveTeam() !== openIssue?.team">
                  <div class="p-2 rounded-lg bg-indigo-50 border border-indigo-200 text-xs text-indigo-900 flex items-center justify-between gap-2 flex-wrap">
                    <span>
                      This ticket belongs to <strong x-text="openIssue?.team"></strong>.
                      You are currently
                      <template x-if="$store.app.impersonation.role">
                        <span>simulating <strong x-text="$store.app.effectiveTeam() || '(no team)'"></strong></span>
                      </template>
                      <template x-if="!$store.app.impersonation.role">
                        <span>in observe-only mode</span>
                      </template>.
                    </span>
                    <button
                      @click="$store.app.setImpersonation({team: openIssue?.team})"
                      class="px-2 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-700 whitespace-nowrap">
                      Simulate as <span x-text="openIssue?.team"></span>
                    </button>
                  </div>
                </template>

                <!-- Action buttons row. Stacked on mobile, wrapped on
                     desktop. Top border separates from card metadata above.
                     min-h-[44px] meets the iOS/Android touch target spec. -->
                <div class="flex flex-col sm:flex-row sm:flex-wrap gap-2 pt-3 border-t border-slate-200">
                  <template x-if="$store.app.canAct(openIssue, 'claim')">
                    <button @click="$store.app.claimIssue(openIssue); openIssue = null"
                            class="px-4 py-3 bg-sky-600 text-white rounded-lg text-sm font-medium hover:bg-sky-700 min-h-[44px]">
                      Claim for <span x-text="$store.app.effectiveTeam() || '(no team)'"></span>
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'send_to_testing')">
                    <button @click="$store.app.sendToTesting(openIssue); openIssue = null"
                            class="px-4 py-3 bg-sky-600 text-white rounded-lg text-sm font-medium hover:bg-sky-700 min-h-[44px]">
                      Send to Testing
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'pass_testing')">
                    <button @click="$store.app.passTesting(openIssue); openIssue = null"
                            class="px-4 py-3 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 min-h-[44px]">
                      Pass Testing
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'fail_testing')">
                    <button @click="rejectFor = 'testing'"
                            class="px-4 py-3 bg-rose-600 text-white rounded-lg text-sm font-medium hover:bg-rose-700 min-h-[44px]">
                      Fail Testing
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'run_security') && (!$store.app.securityCheckResult || $store.app.securityCheckResult.issue_id !== openIssue?.id)">
                    <button @click="$store.app.runSecurityCheck(openIssue)"
                            class="px-4 py-3 bg-violet-600 text-white rounded-lg text-sm font-medium hover:bg-violet-700 min-h-[44px]">
                      Run Security Check
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'pass_security')">
                    <button @click="$store.app.passSecurity(openIssue); openIssue = null"
                            class="px-4 py-3 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 min-h-[44px]">
                      Pass Security → To Deploy
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'reject_security')">
                    <button @click="rejectFor = 'security'"
                            class="px-4 py-3 bg-rose-600 text-white rounded-lg text-sm font-medium hover:bg-rose-700 min-h-[44px]">
                      Reject Security
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'deploy')">
                    <button @click="$store.app.deploy(openIssue); openIssue = null"
                            class="px-4 py-3 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 min-h-[44px]">
                      Deploy
                    </button>
                  </template>
                  <template x-if="openIssue?.status === 'to_deploy' && openIssue?.code_freeze && $store.app.effectiveRole() === 'sysadmin'">
                    <span class="px-4 py-3 bg-slate-200 text-slate-500 rounded-lg text-sm font-medium min-h-[44px] flex items-center">Deploy blocked: code freeze</span>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'accept_production')">
                    <button @click="$store.app.acceptProduction(openIssue); openIssue = null"
                            class="px-4 py-3 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 min-h-[44px]">
                      Accept
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'reject_production')">
                    <button @click="rejectFor = 'production'"
                            class="px-4 py-3 bg-rose-600 text-white rounded-lg text-sm font-medium hover:bg-rose-700 min-h-[44px]">
                      Reject
                    </button>
                  </template>
                  <!-- Pick up for REWORK: shown only when this is a
                       rejection clarification AND the user is the target.
                       One-click; no body required. -->
                  <template x-if="$store.app.canAct(openIssue, 'pickup_clarification')">
                    <button @click="$store.app.pickupClarification(openIssue); openIssue = null"
                            class="px-4 py-3 bg-sky-600 text-white rounded-lg text-sm font-medium hover:bg-sky-700 min-h-[44px]">
                      Pick up for rework → In Progress
                    </button>
                  </template>
                  <!-- ANSWER a question: shown only when this is a
                       question clarification AND the user is the target.
                       Opens an answer form rather than acting in-place. -->
                  <template x-if="$store.app.canAct(openIssue, 'answer_question')">
                    <button @click="answerOpen = true"
                            class="px-4 py-3 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 min-h-[44px]">
                      Send response →
                      <span x-text="$store.app.columnLabel(openIssue?.pre_clarification_status || 'in_progress')"></span>
                    </button>
                  </template>
                  <!-- ASK a question: shown on any card the user can ask
