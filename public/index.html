                       back). Opens an ask form. -->
                  <template x-if="$store.app.canAct(openIssue, 'ask_question')">
                    <button @click="askOpen = true"
                            class="px-4 py-3 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 min-h-[44px]">
                      Ask a question
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'toggle_code_freeze')">
                    <button @click="$store.app.toggleCodeFreeze(openIssue)"
                            class="px-4 py-3 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 min-h-[44px]"
                            x-text="openIssue?.code_freeze ? 'Lift Code Freeze' : 'Set Code Freeze'"></button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'inject_flaw')">
                    <button @click="$store.app.injectFlaw(openIssue); openIssue = null"
                            class="px-4 py-3 bg-fuchsia-700 text-white rounded-lg text-sm font-medium hover:bg-fuchsia-800 min-h-[44px]">
                      Inject Flaw
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'stop_container')">
                    <button @click="$store.app.stopContainer(openIssue); openIssue = null"
                            class="px-4 py-3 bg-rose-700 text-white rounded-lg text-sm font-medium hover:bg-rose-800 min-h-[44px]">
                      Stop Container
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'restart_container')">
                    <button @click="$store.app.restartContainer(openIssue); openIssue = null"
                            class="px-4 py-3 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 min-h-[44px]">
                      Restart Container
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'shift_left_check')">
                    <button @click="$store.app.runShiftLeftCheck(openIssue)"
                            class="px-4 py-3 bg-amber-600 text-white rounded-lg text-sm font-medium hover:bg-amber-700 min-h-[44px]">
                      Shift-Left Security Check
                    </button>
                  </template>
                  <template x-if="$store.app.canAct(openIssue, 'delete_issue') || $store.app.isFacilitatorView()">
                    <button @click="if (confirm('Delete this card?')) { $store.app.deleteIssue(openIssue); openIssue = null }"
                            class="sm:ml-auto px-4 py-3 border border-rose-300 text-rose-700 rounded-lg text-sm font-medium hover:bg-rose-50 min-h-[44px]">
                      Delete card
                    </button>
                  </template>
                </div>

                <!-- Security check / shift-left result panel -->
                <template x-if="$store.app.securityCheckResult && $store.app.securityCheckResult.issue_id === openIssue?.id">
                  <div class="rounded-lg p-3 text-sm"
                       :class="$store.app.securityCheckResult.flawed ? 'bg-rose-50 border border-rose-300 text-rose-900' : 'bg-emerald-50 border border-emerald-300 text-emerald-900'">
                    <div class="font-semibold" x-text="$store.app.securityCheckResult.flawed ? 'Flaw detected' : 'Clean'"></div>
                    <div class="text-xs" x-text="'Source: ' + $store.app.securityCheckResult.source"></div>
                  </div>
                </template>
                <template x-if="$store.app.shiftLeftResult && $store.app.shiftLeftResult.issue_id === openIssue?.id">
                  <div class="rounded-lg p-3 text-sm border"
                       :class="$store.app.shiftLeftResult.flawed ? 'bg-rose-50 border-rose-300 text-rose-900' : 'bg-emerald-50 border-emerald-300 text-emerald-900'">
                    <div class="font-semibold">
                      Shift-left: <span x-text="$store.app.shiftLeftResult.flawed ? 'Flaw detected' : 'Clean'"></span>
                    </div>
                    <div class="text-xs" x-text="'Source: ' + $store.app.shiftLeftResult.source"></div>
                  </div>
                </template>

                <!-- ASK A QUESTION form. Sends the card to the
                     Clarifications column targeting the chosen role/team
                     with kind='question'. The card returns to the asker's
                     column when the target answers. -->
                <template x-if="askOpen">
                  <div class="bg-indigo-50 border border-indigo-200 rounded-lg p-4 space-y-3">
                    <div class="flex items-baseline justify-between gap-2 flex-wrap">
                      <label class="block text-sm font-medium text-indigo-900">
                        Ask a question
                      </label>
                      <span class="text-xs text-indigo-700">
                        Card moves to Clarifications. Returns to
                        <strong x-text="$store.app.columnLabel(openIssue?.status || 'in_progress')"></strong>
                        when answered.
                      </span>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                      <div>
                        <label class="block text-xs text-indigo-800 mb-1">Ask which role?</label>
                        <select x-model="askTargetRole"
                                @change="if (askTargetRole === 'business') askTargetTeam = ''; else if (openIssue?.team) askTargetTeam = openIssue.team;"
                                class="w-full text-sm px-3 py-2 border border-indigo-300 rounded-lg bg-white">
                          <option value="">Pick a role...</option>
                          <option value="business">Business</option>
                          <option value="developer">Developer</option>
                          <option value="tester">Tester</option>
                          <option value="security">Security</option>
                          <option value="sysadmin">SysAdmin</option>
                        </select>
                      </div>
                      <div>
                        <label class="block text-xs text-indigo-800 mb-1">
                          On which team?
                          <span class="text-indigo-600" x-show="askTargetRole === 'business'">(Business is cross-team)</span>
                        </label>
                        <select x-model="askTargetTeam"
                                :disabled="askTargetRole === 'business' || !askTargetRole"
                                class="w-full text-sm px-3 py-2 border border-indigo-300 rounded-lg bg-white disabled:bg-slate-100">
                          <option value="">(any team)</option>
                          <template x-for="t in $store.app.allTeams()" :key="t">
                            <option :value="t" x-text="t"></option>
                          </template>
                        </select>
                      </div>
                    </div>
                    <div>
                      <label class="block text-xs text-indigo-800 mb-1">Your question</label>
                      <textarea x-model="askBody" rows="3" required
                                x-init="$nextTick(() => $el.focus())"
                                placeholder="e.g. The acceptance criteria say 'colourful' but the page is mostly outlines — should I add background colours?"
                                class="w-full text-sm px-3 py-2 border border-indigo-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-2">
                      <button @click="
                        if (!askTargetRole) { $store.app.toast('Pick a role to ask.'); return; }
                        if (!askBody.trim()) { $store.app.toast('Please write your question.'); return; }
                        $store.app.askQuestion(openIssue, askTargetRole, askTargetTeam || null, askBody);
                        askOpen = false; askTargetRole = ''; askTargetTeam = ''; askBody = ''; openIssue = null;"
                              class="px-4 py-3 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 min-h-[44px]">
                        Send question
                      </button>
                      <button @click="askOpen = false; askTargetRole = ''; askTargetTeam = ''; askBody = ''"
                              class="px-4 py-3 border border-slate-300 text-sm font-medium rounded-lg hover:bg-slate-50 min-h-[44px]">
                        Cancel
                      </button>
                    </div>
                  </div>
                </template>

                <!-- ANSWER A QUESTION form. The targeted role writes a
                     reply; the card returns to the asker's column on
                     submit. Differs from Pick up for rework: an answer
                     body is required, and the return target is the
                     asker's pre_clarification_status (not in_progress). -->
                <template x-if="answerOpen">
                  <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 space-y-3">
                    <div class="flex items-baseline justify-between gap-2 flex-wrap">
                      <label class="block text-sm font-medium text-blue-900">
                        Send your response
                      </label>
                      <span class="text-xs text-blue-700">
                        Card returns to
                        <strong x-text="$store.app.columnLabel(openIssue?.pre_clarification_status || 'in_progress')"></strong>
                      </span>
                    </div>
                    <textarea x-model="answerBody" rows="4" required
                              x-init="$nextTick(() => $el.focus())"
                              placeholder="Write your answer to the question above..."
                              class="w-full text-sm px-3 py-2 border border-blue-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    <div class="flex flex-col sm:flex-row gap-2">
                      <button @click="
                        if (!answerBody.trim()) { $store.app.toast('Please write your answer.'); return; }
                        $store.app.answerQuestion(openIssue, answerBody);
                        answerOpen = false; answerBody = ''; openIssue = null;"
                              class="px-4 py-3 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 min-h-[44px]">
                        Send response
                      </button>
                      <button @click="answerOpen = false; answerBody = ''"
                              class="px-4 py-3 border border-slate-300 text-sm font-medium rounded-lg hover:bg-slate-50 min-h-[44px]">
                        Cancel
                      </button>
                    </div>
                  </div>
                </template>

                <!-- Reject reason form. Posts the reason as a rejection
                     comment on the card and routes it to Clarifications. -->
                <template x-if="rejectFor">
                  <div class="bg-rose-50 border border-rose-200 rounded-lg p-4 space-y-3">
                    <label class="block text-sm font-medium text-rose-900">
                      Rejection reason
                      <span class="text-xs font-normal text-rose-700">(posted as a comment so the next person knows what to fix)</span>
                    </label>
                    <textarea x-model="rejectReason" rows="3" required
                              x-init="$nextTick(() => $el.focus())"
                              placeholder="e.g. Missing tasks, tester found wrong drawing, security flaw in card..."
                              class="w-full text-sm px-3 py-2 border border-rose-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-500"></textarea>
                    <div class="flex flex-col sm:flex-row gap-2">
                      <button @click="
                        if (!rejectReason.trim()) { $store.app.toast('Please give a reason.'); return; }
                        if (rejectFor === 'testing') $store.app.failTesting(openIssue, rejectReason);
                        else if (rejectFor === 'security') $store.app.rejectSecurity(openIssue, rejectReason);
                        else if (rejectFor === 'production') $store.app.rejectProduction(openIssue, rejectReason);
                        rejectFor = null; rejectReason = ''; openIssue = null;"
                              class="px-4 py-3 bg-rose-600 text-white text-sm font-medium rounded-lg hover:bg-rose-700 min-h-[44px]">
                        Confirm rejection
                      </button>
                      <button @click="rejectFor = null; rejectReason = ''"
                              class="px-4 py-3 border border-slate-300 text-sm font-medium rounded-lg hover:bg-slate-50 min-h-[44px]">
                        Cancel
                      </button>
                    </div>
                  </div>
                </template>

                <!-- Edit form for Business (collapsible) -->
                <template x-if="$store.app.canAct(openIssue, 'edit_issue')">
                  <details class="bg-slate-50 border border-slate-200 rounded-lg">
                    <summary class="cursor-pointer px-3 py-2 text-sm font-medium hover:bg-slate-100 rounded-t-lg">Edit card</summary>
                    <div x-data="{draft: {title: openIssue?.title || '', description_url: openIssue?.description_url || '', price: openIssue?.price || 0, batch_size: openIssue?.batch_size || 1, acceptance_criteria: openIssue?.acceptance_criteria || ''}}"
                         class="p-3 space-y-2 text-sm border-t border-slate-200">
                      <input x-model="draft.title" placeholder="Title" class="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                      <input x-model="draft.description_url" placeholder="Colouring page URL" class="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                      <div class="grid grid-cols-2 gap-2">
                        <input x-model.number="draft.price" type="number" min="0" placeholder="Price" class="px-3 py-2 border border-slate-300 rounded-lg" />
                        <input x-model.number="draft.batch_size" type="number" min="1" placeholder="Batch size" class="px-3 py-2 border border-slate-300 rounded-lg" />
                      </div>
                      <textarea x-model="draft.acceptance_criteria" rows="3" placeholder="Acceptance criteria"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg"></textarea>
                      <button @click="$store.app.editIssue(openIssue?.id, draft); openIssue = null"
                              class="px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800 min-h-[40px]">Save</button>
                    </div>
                  </details>
                </template>

                <!-- Tasks list (developer view) -->
                <template x-if="['in_progress','testing','security','to_deploy','in_production','accepted'].includes(openIssue?.status)">
                  <div>
                    <div class="flex items-baseline justify-between mb-2">
                      <h3 class="text-sm font-semibold">Tasks</h3>
                      <span class="text-xs text-slate-500"
                            x-text="$store.app.progressFor(openIssue).done + ' / ' + openIssue?.batch_size + ' complete'"></span>
                    </div>
                    <div class="space-y-2">
                      <template x-for="task in $store.app.tasksForIssue(openIssue?.id)" :key="task.id">
                        <div class="p-3 rounded-lg border border-slate-200 bg-slate-50">
                          <div class="flex items-center justify-between gap-2 text-xs">
                            <span class="font-mono text-slate-500">
                              Task #<span x-text="task.id"></span>
                              <span class="ml-1 text-slate-400">·</span>
                              <span x-text="($store.app.userByToken(task.assignee_token) || {}).display_name || task.assignee_token"></span>
                              <template x-if="task.containerized">
                                <span class="ml-2 px-1.5 py-0.5 bg-cyan-100 text-cyan-800 rounded">container</span>
                              </template>
                            </span>
                            <span class="flex items-center gap-2">
                              <span class="px-2 py-0.5 rounded-full"
                                    :class="task.status === 'complete' ? 'bg-emerald-100 text-emerald-800' : 'bg-slate-200 text-slate-700'"
                                    x-text="task.status"></span>
                              <!-- Delete-task button. Visible to any developer
                                   on the issue's team during in_progress
                                   (canAct), and to a real facilitator. Note
                                   the gate is intentionally not assignee-
                                   scoped and intentionally does not check
                                   task.status, so any team dev can recover
                                   from a teammate's mistaken upload after
                                   the task has been marked complete. -->
                              <template x-if="$store.app.canAct(openIssue, 'delete_task') || $store.app.isFacilitatorView()">
                                <button @click="if (confirm('Delete task?')) $store.app.deleteTask(task)"
                                        class="text-rose-600 hover:text-rose-800 text-base leading-none px-1"
                                        title="Delete this task">&times;</button>
                              </template>
                            </span>
                          </div>

                          <!-- Inline thumbnail when complete. Click opens the
                               full-size image in a new tab. -->
                          <template x-if="task.attachment_url">
                            <a :href="task.attachment_url" target="_blank" rel="noopener" class="block mt-2">
                              <img :src="task.attachment_url"
                                   alt="Task attachment"
                                   class="max-h-48 max-w-full rounded border border-slate-200" />
                            </a>
                          </template>

                          <!-- Replace image: shown for completed tasks when the
                               viewer is a team developer on an in_progress issue
                               (any team dev, not just the assignee) or a real
                               facilitator. Same drag-drop + click-to-browse
                               pattern as the original uploader, but it calls
                               replaceTaskImage and does not change task status. -->
                          <template x-if="task.status === 'complete' && task.attachment_url && ($store.app.canAct(openIssue, 'replace_task_image') || $store.app.isFacilitatorView())">
                            <div class="mt-3"
                                 x-data="{
                                   localFile: null,
                                   localPreview: null,
                                   isDragging: false,
                                   isUploading: false,
                                   showPicker: false,
                                   pickFile(file) {
                                     if (!file) return;
                                     if (!file.type || !file.type.startsWith('image/')) {
                                       $store.app.toast('Please choose an image file.');
                                       return;
                                     }
                                     if (file.size > 10 * 1024 * 1024) {
                                       $store.app.toast('Image is over 10 MB. Please choose a smaller file.');
                                       return;
                                     }
                                     if (this.localPreview) URL.revokeObjectURL(this.localPreview);
                                     this.localFile = file;
                                     this.localPreview = URL.createObjectURL(file);
                                   },
                                   clearFile() {
                                     if (this.localPreview) URL.revokeObjectURL(this.localPreview);
                                     this.localFile = null;
                                     this.localPreview = null;
                                   }
                                 }">
                              <template x-if="!showPicker">
                                <button type="button"
                                        @click="showPicker = true"
                                        class="text-xs text-sky-700 hover:text-sky-900 underline">
                                  Replace image
                                </button>
                              </template>
                              <template x-if="showPicker">
                                <div>
                                  <label
                                    class="block border-2 border-dashed rounded-lg p-4 cursor-pointer transition-colors text-center"
                                    :class="isDragging ? 'border-emerald-500 bg-emerald-50' : 'border-slate-300 bg-white hover:border-slate-400 hover:bg-slate-50'"
                                    @dragover.prevent="isDragging = true"
                                    @dragenter.prevent="isDragging = true"
                                    @dragleave.prevent="isDragging = false"
                                    @drop.prevent="isDragging = false; if ($event.dataTransfer && $event.dataTransfer.files && $event.dataTransfer.files[0]) pickFile($event.dataTransfer.files[0]);">
                                    <template x-if="!localFile">
                                      <div class="text-sm text-slate-600 py-2 pointer-events-none">
                                        <div class="font-medium text-slate-700 mb-1">
                                          Drop a replacement image, or
                                          <span class="text-sky-600 underline">click to browse</span>
                                        </div>
                                        <div class="text-xs text-slate-500">PNG, JPG, GIF, WebP, HEIC. Up to 10 MB.</div>
                                      </div>
                                    </template>
                                    <template x-if="localFile">
                                      <div class="flex items-center gap-3 text-left">
                                        <img :src="localPreview"
                                             alt="Selected image preview"
                                             class="w-16 h-16 object-cover rounded border border-slate-200 flex-shrink-0" />
                                        <div class="min-w-0 flex-1">
                                          <div class="text-sm font-medium text-slate-800 truncate" x-text="localFile.name"></div>
                                          <div class="text-xs text-slate-500"
                                               x-text="(localFile.size / 1024).toFixed(0) + ' KB'"></div>
                                        </div>
                                        <button type="button"
                                                @click.prevent.stop="clearFile()"
                                                class="px-2 py-1 text-xs text-slate-600 hover:text-rose-700 underline flex-shrink-0"
                                                aria-label="Remove selected file">Remove</button>
                                      </div>
                                    </template>
                                    <input type="file" accept="image/*" class="sr-only"
                                           aria-label="Choose replacement image file"
                                           @change="pickFile($event.target.files && $event.target.files[0]); $event.target.value = '';" />
                                  </label>
                                  <div class="mt-2 flex items-center gap-2">
                                    <template x-if="localFile">
                                      <button type="button"
                                              :disabled="isUploading"
                                              @click="
                                                isUploading = true;
                                                const ok = await $store.app.replaceTaskImage(task, localFile);
                                                isUploading = false;
                                                if (ok) {clearFile(); showPicker = false;}
                                              "
                                              class="px-4 py-2 bg-sky-600 text-white text-sm font-medium rounded hover:bg-sky-700 min-h-[44px] disabled:opacity-50 disabled:cursor-not-allowed">
                                        <span x-show="!isUploading">Upload replacement</span>
                                        <span x-show="isUploading">Uploading...</span>
                                      </button>
                                    </template>
                                    <button type="button"
                                            @click="clearFile(); showPicker = false;"
                                            class="px-3 py-2 text-sm text-slate-600 hover:text-slate-800 underline">Cancel</button>
                                  </div>
                                </div>
                              </template>
                            </div>
                          </template>

                          <!-- Drag-drop + click-to-browse uploader. Only the task
                               assignee in in_progress sees this. The whole drop
                               zone is a <label> wrapping a hidden file input so a
                               click anywhere opens the OS file picker. accept
                               image/* surfaces the camera on iOS/Android. -->
                          <template x-if="task.status === 'claimed' && task.assignee_token === $store.app.user.token && openIssue?.status === 'in_progress'">
                            <div class="mt-3"
                                 x-data="{
                                   localFile: null,
                                   localPreview: null,
                                   isDragging: false,
                                   isUploading: false,
                                   pickFile(file) {
                                     if (!file) return;
                                     if (!file.type || !file.type.startsWith('image/')) {
                                       $store.app.toast('Please choose an image file.');
                                       return;
                                     }
                                     if (file.size > 10 * 1024 * 1024) {
                                       $store.app.toast('Image is over 10 MB. Please choose a smaller file.');
                                       return;
                                     }
                                     if (this.localPreview) URL.revokeObjectURL(this.localPreview);
                                     this.localFile = file;
                                     this.localPreview = URL.createObjectURL(file);
                                   },
                                   clearFile() {
                                     if (this.localPreview) URL.revokeObjectURL(this.localPreview);
                                     this.localFile = null;
                                     this.localPreview = null;
                                   }
                                 }">
                              <label
                                class="block border-2 border-dashed rounded-lg p-4 cursor-pointer transition-colors text-center"
                                :class="isDragging ? 'border-emerald-500 bg-emerald-50' : 'border-slate-300 bg-white hover:border-slate-400 hover:bg-slate-50'"
                                @dragover.prevent="isDragging = true"
                                @dragenter.prevent="isDragging = true"
                                @dragleave.prevent="isDragging = false"
                                @drop.prevent="isDragging = false; if ($event.dataTransfer && $event.dataTransfer.files && $event.dataTransfer.files[0]) pickFile($event.dataTransfer.files[0]);">
                                <template x-if="!localFile">
                                  <div class="text-sm text-slate-600 py-2 pointer-events-none">
                                    <svg xmlns="http://www.w3.org/2000/svg"
                                         class="w-8 h-8 mx-auto mb-2 text-slate-400"
                                         fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    <div class="font-medium text-slate-700 mb-1">
                                      Drop your finished image here, or
                                      <span class="text-sky-600 underline">click to browse</span>
                                    </div>
                                    <div class="text-xs text-slate-500">PNG, JPG, GIF, WebP, HEIC. Up to 10 MB.</div>
                                  </div>
                                </template>
                                <template x-if="localFile">
                                  <div class="flex items-center gap-3 text-left">
                                    <img :src="localPreview"
                                         alt="Selected image preview"
                                         class="w-16 h-16 object-cover rounded border border-slate-200 flex-shrink-0" />
                                    <div class="min-w-0 flex-1">
                                      <div class="text-sm font-medium text-slate-800 truncate" x-text="localFile.name"></div>
                                      <div class="text-xs text-slate-500"
                                           x-text="(localFile.size / 1024).toFixed(0) + ' KB'"></div>
                                    </div>
                                    <button type="button"
                                            @click.prevent.stop="clearFile()"
                                            class="px-2 py-1 text-xs text-slate-600 hover:text-rose-700 underline flex-shrink-0"
                                            aria-label="Remove selected file">Remove</button>
                                  </div>
                                </template>
                                <input type="file" accept="image/*" class="sr-only"
                                       aria-label="Choose image file"
                                       @change="pickFile($event.target.files && $event.target.files[0]); $event.target.value = '';" />
                              </label>
                              <template x-if="localFile">
                                <button type="button"
                                        :disabled="isUploading"
                                        @click="
                                          isUploading = true;
                                          const ok = await $store.app.completeTask(task, localFile);
                                          isUploading = false;
                                          if (ok) clearFile();
                                        "
                                        class="mt-2 w-full sm:w-auto px-4 py-2 bg-emerald-600 text-white text-sm font-medium rounded hover:bg-emerald-700 min-h-[44px] disabled:opacity-50 disabled:cursor-not-allowed">
                                  <span x-show="!isUploading">Upload &amp; mark complete</span>
                                  <span x-show="isUploading">Uploading...</span>
                                </button>
                              </template>
                            </div>
                          </template>
                        </div>
                      </template>
                      <template x-if="$store.app.tasksForIssue(openIssue?.id || -1).length === 0">
                        <div class="text-sm text-slate-500 italic">No tasks yet.</div>
                      </template>
                      <template x-if="$store.app.canAct(openIssue, 'add_task')">
                        <div class="p-3 rounded-lg border border-dashed border-slate-300"
                             x-data="{containerized: false}">
                          <template x-if="$store.app.gameState.current_sprint >= 3">
                            <label class="flex items-center gap-2 text-sm mb-2">
                              <input type="checkbox" x-model="containerized" />
                              <span>Mark next task as containerized</span>
                            </label>
                          </template>
                          <button @click="$store.app.createTask(openIssue, {containerized: containerized && $store.app.gameState.current_sprint >= 3}); containerized = false"
                                  class="w-full sm:w-auto px-4 py-2 bg-slate-900 text-white text-sm rounded hover:bg-slate-800 min-h-[44px]">
                            + Claim a Task
                          </button>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>

                <!-- Comments -->
                <div>
                  <div class="flex items-center justify-between mb-2">
                    <h3 class="text-sm font-semibold"
                        x-text="'Comments (' + $store.app.commentCountForIssue(openIssue?.id || -1) + ')'"></h3>
                    <button @click="$store.app.setCommentOrder(!$store.app.commentSortDesc)"
                            class="text-xs text-slate-500 hover:text-slate-800 underline"
                            x-text="$store.app.commentSortDesc ? 'newest first' : 'oldest first'"></button>
                  </div>
                  <div class="space-y-2">
                    <template x-for="c in $store.app.commentsForIssue(openIssue?.id || -1)" :key="c.id">
                      <div class="bg-white border rounded-lg p-3 text-sm"
                           :class="c.is_rejection ? 'border-l-4 border-l-rose-500 border-t border-r border-b border-rose-200' : 'border-slate-200'">
                        <div class="flex items-center gap-2 text-xs text-slate-500 flex-wrap">
                          <span class="font-medium text-slate-700" x-text="$store.app.roleLabel(c.author_role_at_post)"></span>
                          <template x-if="c.author_team_at_post"><span x-text="'· ' + c.author_team_at_post"></span></template>
                          <span x-text="'· ' + $store.app.relativeTime(c.created_at)"></span>
                          <template x-if="c.edited_at"><span class="italic text-slate-400">(edited)</span></template>
                          <template x-if="c.hidden_at && $store.app.isFacilitatorView()">
                            <span class="px-1.5 py-0.5 bg-rose-100 text-rose-700 rounded text-[10px] font-semibold">hidden</span>
                          </template>
                          <span class="ml-auto flex gap-2"
                                x-show="$store.app.user && (c.author_token === $store.app.user.token || $store.app.isFacilitatorView())">
                            <button x-show="c.author_token === $store.app.user.token"
                                    @click="const v = prompt('Edit comment', c.body); if (v != null) $store.app.editComment(c.id, v)"
                                    class="text-slate-500 hover:text-slate-800 underline">edit</button>
                            <button x-show="c.author_token === $store.app.user.token || $store.app.isFacilitatorView()"
                                    @click="if (confirm('Delete this comment?')) $store.app.deleteComment(c.id)"
                                    class="text-rose-600 hover:text-rose-800 underline">delete</button>
                            <template x-if="$store.app.isFacilitatorView() && !c.hidden_at">
                              <button @click="$store.app.hideCommentByFacilitator(c.id)"
                                      class="text-amber-700 hover:text-amber-900 underline">hide</button>
                            </template>
                            <template x-if="$store.app.isFacilitatorView() && c.hidden_at">
                              <button @click="$store.app.unhideCommentByFacilitator(c.id)"
                                      class="text-amber-700 hover:text-amber-900 underline">unhide</button>
                            </template>
                          </span>
                        </div>
                        <div class="text-slate-800 whitespace-pre-wrap mt-1.5" x-text="c.body"></div>
                      </div>
                    </template>
                    <template x-if="$store.app.commentsForIssue(openIssue?.id || -1).length === 0">
                      <div class="text-sm text-slate-500 italic">No comments yet.</div>
                    </template>
                  </div>
                  <!-- Composer -->
                  <div class="mt-3" x-data="{draft: ''}">
                    <textarea x-model="draft" rows="2"
                              placeholder="Add a comment. Anyone can comment on any card."
                              class="w-full text-sm px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"></textarea>
                    <button @click="if (draft.trim()) { $store.app.postComment(openIssue, draft); draft = ''; }"
                            :disabled="!draft.trim()"
                            class="mt-2 px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed min-h-[40px]">
                      Post comment
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- NEW CARD MODAL (Business) -->
        <template x-if="newCard">
          <div class="fixed inset-0 bg-slate-900/50 z-30 flex items-end sm:items-center justify-center p-0 sm:p-4"
               @keydown.escape.window="newCard = null"
               @click.self="newCard = null">
            <form class="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl max-h-[90vh] overflow-y-auto shadow-2xl p-5 sm:p-6 space-y-4"
                  @submit.prevent="await $store.app.createIssue(newCard); newCard = null">
              <div class="flex items-start justify-between">
                <div>
                  <h2 class="text-xl font-bold">New Product Request</h2>
                  <p class="text-xs text-slate-500 mt-1">
                    Sprint <span x-text="$store.app.gameState.current_sprint"></span>: pick a category and a drawing,
                    or fill in your own.
                  </p>
                </div>
                <button type="button" @click="newCard = null"
                        class="text-slate-400 hover:text-slate-600 text-2xl leading-none"
                        aria-label="Close">&times;</button>
              </div>

              <div>
                <label class="block text-sm font-medium mb-1">Category</label>
                <select x-model="newCard.category"
                        @change="newCard.curated_url_id = null"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                  <option value="">Pick a category...</option>
                  <template x-for="c in $store.app.categoriesForCurrentSprint()" :key="c">
                    <option :value="c" x-text="c"></option>
                  </template>
                </select>
              </div>

              <template x-if="newCard.category">
                <div>
                  <label class="block text-sm font-medium mb-1">Drawing</label>
                  <select @change="
                          const id = parseInt($event.target.value);
                          newCard.curated_url_id = id || null;
                          if (id) {
                            const c = $store.app.curatedUrls.find(x => x.id === id);
                            if (c) {
                              newCard.title = c.label;
                              newCard.description_url = c.url;
                              newCard.price = c.default_price;
                              newCard.batch_size = c.default_batch_size;
                            }
                          }"
                          class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                    <option value="">Pick a drawing...</option>
                    <template x-for="c in $store.app.curatedUrlsFor($store.app.gameState.current_sprint, newCard.category)" :key="c.id">
                      <option :value="c.id" x-text="c.label"></option>
                    </template>
                  </select>
                  <p class="text-xs text-slate-500 mt-1">Picking a drawing pre-fills the URL, price, and batch size.</p>
                </div>
              </template>

              <div>
                <label class="block text-sm font-medium mb-1">Title</label>
                <input x-model="newCard.title" type="text" required
                       x-init="$nextTick(() => $el.focus())"
                       placeholder="e.g. Puppy Sitting"
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg" />
              </div>

              <div>
                <label class="block text-sm font-medium mb-1">Colouring page URL</label>
                <input x-model="newCard.description_url" type="url"
                       placeholder="https://www.online-coloring.com/..."
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg" />
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-medium mb-1">Price</label>
                  <input x-model.number="newCard.price" type="number" min="1"
                         class="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">Batch size</label>
                  <input x-model.number="newCard.batch_size" type="number" min="1"
                         class="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium mb-1">Acceptance criteria</label>
                <textarea x-model="newCard.acceptance_criteria" rows="3"
                          placeholder="What does Business need to see to accept this card?"
                          class="w-full px-3 py-2 border border-slate-300 rounded-lg"></textarea>
              </div>

              <div class="flex gap-2 pt-2">
                <button type="submit"
                        class="flex-1 bg-slate-900 text-white font-medium py-3 rounded-lg hover:bg-slate-800 min-h-[44px]">
                  Create
                </button>
                <button type="button" @click="newCard = null"
                        class="px-4 py-3 border border-slate-300 rounded-lg hover:bg-slate-50 min-h-[44px]">
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </template>

        <!-- HELP MODAL -->
        <template x-if="helpOpen">
          <div class="fixed inset-0 bg-slate-900/50 z-30 flex items-end sm:items-center justify-center p-0 sm:p-4"
               @keydown.escape.window="helpOpen = false"
               @click.self="helpOpen = false">
            <div class="bg-white w-full sm:max-w-3xl rounded-t-2xl sm:rounded-2xl max-h-[90vh] overflow-y-auto shadow-2xl p-5 sm:p-8">
              <div class="flex items-start justify-between mb-4">
                <h2 class="text-xl font-bold">How to play</h2>
                <button @click="helpOpen = false"
                        class="text-slate-400 hover:text-slate-600 text-2xl leading-none"
                        aria-label="Close help">&times;</button>
              </div>

              <div class="text-sm space-y-4 leading-relaxed">
                <!-- Personalized header -->
                <div class="p-3 rounded-lg bg-slate-50 border border-slate-200 text-slate-700">
                  You are signed in as
                  <strong x-text="$store.app.roleLabel($store.app.effectiveRole())"></strong>
                  <template x-if="$store.app.effectiveTeam()">
                    <span>on <strong x-text="$store.app.effectiveTeam()"></strong></span>
                  </template>
                  <template x-if="!$store.app.effectiveTeam() && $store.app.effectiveRole() === 'business'">
                    <span>(no team; Business is cross-team)</span>
                  </template>.
                  Sprint <strong x-text="$store.app.gameState.current_sprint"></strong>.
                  <template x-if="$store.app.crossTrainedRole()">
                    <span class="block mt-1">
                      Cross-trained as
                      <strong x-text="$store.app.roleLabel($store.app.crossTrainedRole())"></strong>
                      <template x-if="$store.app.user && $store.app.user.cross_trained_team">
                        <span> on <strong x-text="$store.app.user.cross_trained_team"></strong></span>
                      </template>.
                    </span>
                  </template>
                </div>

                <p>
                  You have been assigned a <strong>role</strong> and (if applicable) a <strong>team</strong>.
                  The board moves Product Requests from Market through to In Production. Each role owns a stage.
                </p>

                <div>
                  <h3 class="font-semibold text-slate-900 mb-1">Your role</h3>
                  <ul class="list-disc ml-5 space-y-1">
                    <li><strong>Business</strong>: creates Product Requests in Market with Acceptance Criteria.
                      Accepts or rejects items in Production. Rejected items go to Clarifications with a comment.</li>
                    <li><strong>Developer</strong>: claims requests, creates Tasks for each batch item, completes
                      each by uploading the finished image, then sends to Testing.</li>
                    <li><strong>Tester</strong>: passes or fails requests in Testing by visual inspection of the
                      attached images.</li>
                    <li><strong>Security</strong>: runs a Security Check in the Security column. Passes or rejects.</li>
                    <li><strong>SysAdmin</strong>: deploys items in To Deploy to In Production. Owns the Code
                      Freeze toggle and restarts stopped containers.</li>
                    <li><strong>Observer</strong>: read-only visibility across the whole board. Can comment.</li>
                    <li><strong>Hacker</strong>: secret role. Appears as Developer in the UI but can inject flaws
                      and (in Sprint 3) stop containers.</li>
                  </ul>
                </div>

                <div>
                  <h3 class="font-semibold text-slate-900 mb-1">Colouring pages</h3>
                  <p>
                    Use the
                    <a href="https://www.online-coloring.com" target="_blank" rel="noopener" class="text-sky-600 underline">online-coloring.com</a>
                    URL on each card to colour the page. Save or screenshot the result, or photograph paper colouring
                    on your phone. On your Task, drop the image into the upload area or click to browse. The app
                    uploads to storage and marks the Task complete. No external image host needed.
                  </p>
                </div>

                <div>
                  <h3 class="font-semibold text-slate-900 mb-1">Clarifications</h3>
                  <p>
                    A rejected card lands in the Clarifications column with the rejection reason posted as a
                    comment. The targeted role/team picks it up to address the issue. Rejection can come from
                    Tester, Security, or Business.
                  </p>
                </div>

                <div>
                  <h3 class="font-semibold text-slate-900 mb-1">Sprints</h3>
                  <p>
                    Sprint 1 is straightforward Waterfall. Sprint 2 introduces a hidden <strong>Hacker</strong>
                    and <strong>cross-training</strong> (each Dev/Tester/Security/SysAdmin gets a secondary role
                    on their team). Sprint 3 turns on <strong>CI/CD bypass</strong> (containerized cards skip
                    Testing and Security straight to Production) and <strong>role swap</strong>
                    (Tester→Developer, Security→SysAdmin).
                  </p>
                </div>

                <div>
                  <h3 class="font-semibold text-slate-900 mb-1">Comments</h3>
                  <p>
                    Anyone can post a comment on any card. Use comments to ask questions, explain rejections,
                    or coordinate. You can edit and delete your own comments.
                  </p>
                </div>

                <hr class="my-4 border-slate-200" />

                <p>
                  <a href="guide.html?doc=PARTICIPANT_GUIDE.md" target="_blank" rel="noopener"
                     class="text-sky-600 underline font-medium">
                    Open the full participant guide →
                  </a>
                  <span class="block text-xs text-slate-500 mt-1">
                    Includes per-role guides, sprint scenarios, and links to the other project docs.
                  </span>
                </p>
                <p>
                  <a href="leaderboard.html" target="_blank" rel="noopener" class="text-sky-600 underline font-medium">
                    Open the leaderboard →
                  </a>
                  <span class="block text-xs text-slate-500 mt-1">
                    Live team and individual standings.
                  </span>
                </p>
                <p class="text-xs text-slate-500">
                  Tap the <span class="inline-block px-1.5 border rounded">?</span> in any card's header for
                  context-aware tips about what you can do on that specific card.
                </p>

                <hr class="my-4 border-slate-200" />
                <p class="text-xs text-slate-500">
                  Adapted from Pylayeva, D. (2024).
                  <em>DevSecOps Adventures</em>.
                  Based on the
                  <a href="https://github.com/johnanvik/devops-colouring" target="_blank" rel="noopener" class="underline">
                    johnanvik/devops-colouring
                  </a>
                  template.
                </p>
              </div>
            </div>
          </div>
        </template>

        <!-- Toast. Lifts above the facilitator bar so they don't collide. -->
        <div x-show="$store.app.toastMsg" x-transition.opacity
             :class="$store.app.isFacilitator() ? 'bottom-20' : 'bottom-4'"
             class="fixed left-1/2 -translate-x-1/2 z-40 bg-slate-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg"
             x-text="$store.app.toastMsg"></div>

        <!-- ============================================================
             FACILITATOR SIMULATE BAR (fixed to the bottom edge)
             Visible only when user is a facilitator. Deliberately
             low-contrast so the rest of the page above it matches what
             a participant would see. The facilitator picks a role and
             optionally a team; everything above this bar then renders
             from the participant's perspective. Stop simulating returns
             to observe-only mode.
             ============================================================ -->
        <template x-if="$store.app.isFacilitator()">
          <div class="fixed inset-x-0 bottom-0 z-40 bg-indigo-50/95 backdrop-blur border-t border-indigo-200 shadow-lg">
            <div class="px-3 sm:px-6 py-2 flex items-center gap-2 text-xs text-indigo-900 flex-wrap">
              <span class="font-medium uppercase tracking-wide text-[10px] text-indigo-700">Facilitator</span>
              <a href="admin.html" class="text-sky-600 underline">Admin</a>
              <a href="tests.html" target="_blank" rel="noopener" class="text-sky-600 underline">Tests</a>
              <span class="hidden sm:inline text-indigo-700/70">simulate:</span>
              <select
                x-model="$store.app.impersonation.role"
                @change="$store.app.setImpersonation({role: $event.target.value})"
                class="px-2 py-1 border border-indigo-300 bg-white rounded min-h-[32px]">
                <option value="">Observe only</option>
                <option value="business">as Business</option>
                <option value="developer">as Developer</option>
                <option value="tester">as Tester</option>
                <option value="security">as Security</option>
                <option value="sysadmin">as SysAdmin</option>
                <option value="observer">as Observer</option>
                <option value="hacker">as Hacker</option>
              </select>
              <select
                x-model="$store.app.impersonation.team"
                @change="$store.app.setImpersonation({team: $event.target.value})"
                x-show="!!$store.app.impersonation.role"
                class="px-2 py-1 border border-indigo-300 bg-white rounded min-h-[32px]">
                <option value="">(no team)</option>
                <template x-for="t in $store.app.allTeams()" :key="t">
                  <option :value="t" x-text="t"></option>
                </template>
              </select>
              <template x-if="$store.app.impersonation.role">
                <button
                  @click="$store.app.setImpersonation({role: '', team: ''})"
                  class="ml-auto px-2 py-1 text-indigo-700 hover:text-indigo-900 underline">
                  Stop simulating
                </button>
              </template>
              <template x-if="!$store.app.impersonation.role">
                <span class="ml-auto text-indigo-700/60 hidden sm:inline">
                  Pick a role to act as a participant. Nothing above this bar gives you away.
                </span>
              </template>
            </div>
          </div>
        </template>

        <!-- Bottom padding so board cards aren't hidden behind the bar. -->
        <template x-if="$store.app.isFacilitator()">
          <div class="h-12" aria-hidden="true"></div>
        </template>
      </div>
    </template>
  </body>
</html>
